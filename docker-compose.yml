version: "3.8"

services:
  trading-bot:
    build:
      context: .
      dockerfile: Dockerfile
    image: btc-leads-trading-bot:latest
    container_name: btc-trading-bot
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      # SQLite database persists across container restarts
      - bot-data:/app/data
      # Optional: mount .env directly for live config changes
      - ./.env:/app/.env:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: "512M"
        reservations:
          cpus: "0.5"
          memory: "256M"

volumes:
  bot-data:
    name: btc-trading-bot-data
