name: Sync to Hugging Face Spaces

on:
  # Trigger on push to ANY branch (the push command uses HEAD:refs/heads/main
  # to map whatever local branch we're on to HF's 'main' branch).
  push:
    branches:
      - '*'

  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate HF_TOKEN secret
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -z "$HF_TOKEN" ]; then
            echo "❌ ERROR: HF_TOKEN secret is not set."
            echo "   Go to: GitHub repo → Settings → Secrets and variables → Actions"
            echo "   Add secret: HF_TOKEN = your Hugging Face access token (with write permission)"
            echo "   Generate token at: https://huggingface.co/settings/tokens"
            exit 1
          fi
          echo "✅ HF_TOKEN is set."

      - name: Detect current branch
        id: branch
        run: |
          BRANCH=$(git rev-parse --abbrev-ref HEAD)
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT
          echo "🔍 Local branch: $BRANCH"
          echo "   Will push as: HEAD:refs/heads/main"

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          HF_SPACE="DDahir/btc-lead-trading-bot"
          echo "🔄 Syncing '${{ steps.branch.outputs.branch }}' → huggingface.co/spaces/${HF_SPACE} ..."
          git remote add hf "https://user:${HF_TOKEN}@huggingface.co/spaces/${HF_SPACE}"
          # HEAD:refs/heads/main forces whatever local branch we're on to map
          # to HF's default 'main' branch. This solves the "src refspec main
          # does not match any" error when the local branch is 'master'.
          git push hf HEAD:refs/heads/main --force
          echo "✅ Sync complete."
          echo "   Visit: https://huggingface.co/spaces/${HF_SPACE}"
