name: Sync to Hugging Face Spaces

on:
  push:
    branches: [main]

  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to Hugging Face Space
        env:
          # ════════════════════════════════════════════════════════════════
          # REQUIRED GitHub Repository Secrets (Settings → Secrets → Actions):
          #
          #   HF_TOKEN         — Hugging Face access token (read/write)
          #                      Generate at: https://huggingface.co/settings/tokens
          #
          #   HF_SPACE_URL     — Full URL of your Space, e.g.:
          #                      "username/btc-trading-bot"
          #                      Create the Space first at: https://huggingface.co/new-space
          #                      (Select Docker SDK, leave hardware as Free)
          # ════════════════════════════════════════════════════════════════
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE_URL: ${{ secrets.HF_SPACE_URL }}
        run: |
          echo "🔄 Syncing to huggingface.co/spaces/${HF_SPACE_URL} ..."
          git remote add hf "https://user:${HF_TOKEN}@huggingface.co/spaces/${HF_SPACE_URL}"
          git push hf main --force
          echo "✅ Sync complete. Visit: https://huggingface.co/spaces/${HF_SPACE_URL}"
